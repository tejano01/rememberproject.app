<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Remember Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, sans-serif; 
           background: #F7F3EE; color: #2C1F14; 
           display: flex; align-items: center; 
           justify-content: center; min-height: 100vh; 
           margin: 0; text-align: center; padding: 20px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 32px; }
    a { background: #C17B5C; color: white; 
        padding: 14px 28px; border-radius: 12px; 
        text-decoration: none; font-size: 16px; }
  </style>
</head>
<body>
  <div>
    <h1>Remember Project</h1>
    <p>Someone shared a family memory with you.</p>
    <a href="https://apps.apple.com/us/app/remember-project/id YOUR_APP_ID">
      Open in Remember Project
    </a>
  </div>
  <script>
    const path = window.location.pathname;
    const id = path.split('/').filter(Boolean).pop();
    const recordingId = new URLSearchParams(window.location.search).get('id');
    if (id) {
      window.location = 'rememberproject://listen/' + recordingId;
    }
  </script>
</body>
</html>
