<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Remember Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    // Redirect /listen/[id] to the listen page with the id as a query param
    const path = window.location.pathname;
    if (path.startsWith('/listen/')) {
      const id = path.split('/').filter(Boolean).pop();
      window.location.replace('/listen/?id=' + id);
    }
  </script>
</head>
<body></body>
</html>
