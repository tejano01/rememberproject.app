<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Remember Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <script>
    const hash = window.location.hash;
    const search = window.location.search;

    const deepLink = "rememberproject://auth/callback" + search + hash;

    window.location.href = deepLink;

    setTimeout(function() {
      document.body.innerHTML =
        '<p style="font-family:sans-serif;text-align:center;margin-top:40px;">Opening Remember Project...</p>';
    }, 2000);
  </script>

  <p style="font-family:sans-serif;text-align:center;margin-top:40px;">
    Opening Remember Project...
  </p>
</body>
</html>
